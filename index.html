
                        <!DOCTYPE html>
                        <html lang="en">
                        <head>
                            <meta charset="UTF-8">
                            <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <style>
                body {
                  background-color: white; /* Ensure the iframe has a white background */
                }

                :root {
    --primary-green: #00D632;
    --dark-green: #00b329;
    --bg-gray: #f0f2f5;
    --text-dark: #0a0a0a;
    --text-gray: #888888;
    --border-color: #e6e6e6;
}

* {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

body {
    margin: 0;
    padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background-color: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
}

.phone-frame {
    width: 100%;
    max-width: 400px;
    height: 100%;
    max-height: 850px;
    background-color: #fff;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
}

.screen {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.3s;
    background: #fff;
    z-index: 10;
}

.hidden {
    transform: translateX(100%);
    opacity: 0;
    pointer-events: none;
    z-index: 0;
}

.active {
    transform: translateX(0);
    opacity: 1;
    pointer-events: all;
    z-index: 20;
}

#home-screen {
    background-color: var(--primary-green);
    color: white;
    justify-content: space-between;
    padding: 20px;
}

.home-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 20px;
}

.profile-icon {
    width: 32px;
    height: 32px;
    background: rgba(255,255,255,0.2);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
}

.balance-display {
    font-size: 20px;
    font-weight: 500;
    opacity: 0.8;
}

.amount-container {
    flex-grow: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 64px;
    font-weight: 700;
    letter-spacing: -2px;
}

.currency-symbol {
    font-size: 40px;
    margin-right: 5px;
    margin-top: 10px;
}

.keypad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 15px;
    padding-bottom: 20px;
}

.key {
    background: rgba(255,255,255,0.15);
    border: none;
    border-radius: 50%;
    width: 70px;
    height: 70px;
    font-size: 28px;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    margin: 0 auto;
    transition: background 0.1s;
}

.key:active {
    background: rgba(255,255,255,0.3);
}

.key.action-key {
    background: transparent;
    font-size: 20px;
    font-weight: 600;
}

.home-actions {
    display: flex;
    justify-content: space-between;
    padding: 0 20px 30px 20px;
}

.action-btn {
    background: rgba(255,255,255,0.2);
    border: none;
    padding: 15px 30px;
    border-radius: 30px;
    color: white;
    font-size: 18px;
    font-weight: 600;
    cursor: pointer;
    width: 45%;
}

#payment-screen {
    background-color: #fff;
}

.pay-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 20px;
    border-bottom: 1px solid var(--border-color);
    height: 60px;
}

.pay-amount {
    font-size: 20px;
    font-weight: 700;
    color: var(--text-dark);
}

.pay-btn-header {
    background-color: var(--primary-green);
    color: white;
    border: none;
    padding: 8px 24px;
    border-radius: 20px;
    font-weight: 600;
    font-size: 16px;
    cursor: pointer;
}

.pay-btn-header:disabled {
    background-color: #ccc;
    cursor: not-allowed;
}

.input-group {
    padding: 20px;
}

.input-row {
    display: flex;
    align-items: center;
    margin-bottom: 20px;
    border-bottom: 1px solid var(--border-color);
    padding-bottom: 10px;
}

.input-label {
    width: 40px;
    font-weight: 600;
    color: var(--text-gray);
    font-size: 16px;
}

.input-field {
    border: none;
    font-size: 16px;
    flex-grow: 1;
    outline: none;
    color: var(--text-dark);
    background: transparent;
}

.input-field::placeholder {
    color: #ccc;
}

.use-balance {
    display: flex;
    align-items: center;
    font-size: 14px;
    color: var(--text-gray);
    margin-top: 10px;
}

.cash-tag {
    background: var(--primary-green);
    color: white;
    width: 16px;
    height: 16px;
    border-radius: 3px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    margin-right: 8px;
    font-weight: bold;
}

.suggested-list {
    padding: 0 20px;
    overflow-y: auto;
    flex-grow: 1;
}

.suggested-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--text-gray);
    margin-bottom: 15px;
    margin-top: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.add-contact-btn {
    background: none;
    border: none;
    color: var(--primary-green);
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
}

.contact-item {
    display: flex;
    align-items: center;
    padding: 10px 0;
    cursor: pointer;
}

.contact-avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background-color: #eee;
    margin-right: 15px;
    overflow: hidden;
    flex-shrink: 0;
}

.contact-avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.contact-info {
    display: flex;
    flex-direction: column;
}

.contact-name {
    font-size: 16px;
    font-weight: 500;
    color: var(--text-dark);
}

.contact-handle {
    font-size: 14px;
    color: var(--text-gray);
    margin-top: 2px;
}

#processing-screen {
    background: white;
    justify-content: center;
    align-items: center;
}

.spinner {
    width: 40px;
    height: 40px;
    border: 4px solid #f3f3f3;
    border-top: 4px solid var(--primary-green);
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

#success-screen {
    background: white;
    padding: 40px 20px;
    align-items: center;
    justify-content: center;
    text-align: center;
}

.success-icon {
    width: 80px;
    height: 80px;
    background: var(--primary-green);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 30px;
    color: white;
    font-size: 40px;
    animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

@keyframes popIn {
    0% { transform: scale(0); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
}

.success-text {
    font-size: 20px;
    color: var(--text-dark);
    margin-bottom: 10px;
    line-height: 1.4;
}

.success-subtext {
    color: var(--text-gray);
    font-size: 16px;
    margin-bottom: 40px;
}

.done-btn {
    background: var(--primary-green);
    color: white;
    border: none;
    width: 100%;
    padding: 18px;
    border-radius: 30px;
    font-size: 18px;
    font-weight: 600;
    cursor: pointer;
}

.keyboard-spacer {
    height: 0px;
    transition: height 0.3s;
    background: #fff;
}

.keyboard-active .keyboard-spacer {
    height: 250px;
}


              </style>
                        </head>
                        <body>
                            <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Payment App Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="phone-frame" id="app-container">
        
        <!-- HOME SCREEN -->
        <div id="home-screen" class="screen active">
            <div class="home-header">
                <div class="profile-icon">👤</div>
                <div class="balance-display" id="home-balance">$399,199.00</div>
            </div>

            <div class="amount-container">
                <span class="currency-symbol">$</span>
                <span id="display-amount">0</span>
            </div>

            <div class="keypad">
                <button class="key" onclick="appendNumber('1')">1</button>
                <button class="key" onclick="appendNumber('2')">2</button>
                <button class="key" onclick="appendNumber('3')">3</button>
                <button class="key" onclick="appendNumber('4')">4</button>
                <button class="key" onclick="appendNumber('5')">5</button>
                <button class="key" onclick="appendNumber('6')">6</button>
                <button class="key" onclick="appendNumber('7')">7</button>
                <button class="key" onclick="appendNumber('8')">8</button>
                <button class="key" onclick="appendNumber('9')">9</button>
                <button class="key action-key" onclick="clearAmount()">Clear</button>
                <button class="key" onclick="appendNumber('0')">0</button>
                <button class="key action-key" onclick="deleteNumber()">⌫</button>
            </div>

            <div class="home-actions">
                <button class="action-btn">Request</button>
                <button class="action-btn" onclick="goToPayment()">Pay</button>
            </div>
        </div>

        <!-- PAYMENT SCREEN -->
        <div id="payment-screen" class="screen hidden">
            <div class="pay-header">
                <div class="pay-amount" id="pay-header-amount">$0</div>
                <button class="pay-btn-header" id="confirm-pay-btn" onclick="processPayment()" disabled>Pay</button>
            </div>

            <div class="input-group">
                <div class="input-row">
                    <span class="input-label">To</span>
                    <input type="text" class="input-field" id="recipient-input" placeholder="$Name, $Cashtag, Phone, Email" oninput="handleRecipientInput()">
                </div>
                <div class="input-row">
                    <span class="input-label">For</span>
                    <input type="text" class="input-field" placeholder="Note (optional)" value="shere like">
                </div>
                <div class="use-balance">
                    <span class="cash-tag">$</span>
                    <span>Use Cash Balance: <span id="pay-balance-display">$399,199.00</span></span>
                </div>
            </div>

            <div class="suggested-list" id="contact-list">
                <div class="suggested-title">
                    <span>Suggested</span>
                    <button class="add-contact-btn" onclick="addNewContact()">+ New</button>
                </div>
            </div>

            <div class="keyboard-spacer"></div>
        </div>

        <!-- PROCESSING SCREEN -->
        <div id="processing-screen" class="screen hidden">
            <div class="spinner"></div>
        </div>

        <!-- SUCCESS SCREEN -->
        <div id="success-screen" class="screen hidden">
            <div class="success-icon">✓</div>
            <div class="success-text">You sent <span id="success-amount" style="font-weight:bold;"></span> to <span id="success-recipient" style="font-weight:bold;"></span></div>
            <div class="success-subtext">Available in their account instantly</div>
            <button class="done-btn" onclick="resetApp()">Done</button>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>



              <script>
                              let currentAmount = 0;
let currentRecipient = '';
let currentBalance = 399199.00;

const contacts = [
    { name: "Sarah Johnson", handle: "$sarahj", imgPos: "0% 0%" },
    { name: "Michael Chen", handle: "$mchen", imgPos: "50% 0%" },
    { name: "Emma Williams", handle: "$emmaw", imgPos: "100% 0%" },
    { name: "James Rodriguez", handle: "$jamesr", imgPos: "0% 50%" },
    { name: "Olivia Brown", handle: "$oliviab", imgPos: "50% 50%" },
    { name: "David Martinez", handle: "$davidm", imgPos: "100% 50%" },
    { name: "Sophia Taylor", handle: "$sophiat", imgPos: "50% 100%" }
];

const avatarSheetUrl = "https://image.qwenlm.ai/public_source/084f008e-b20c-49be-9128-bc9435f8d46c/164a45b9b-7898-48cb-8536-3cffe6468a3f.png";

const displayAmountEl = document.getElementById('display-amount');
const payHeaderAmountEl = document.getElementById('pay-header-amount');
const recipientInput = document.getElementById('recipient-input');
const contactListEl = document.getElementById('contact-list');
const confirmPayBtn = document.getElementById('confirm-pay-btn');
const appContainer = document.getElementById('app-container');
const homeBalanceEl = document.getElementById('home-balance');
const payBalanceEl = document.getElementById('pay-balance-display');

function initContacts() {
    const title = contactListEl.querySelector('.suggested-title');
    contactListEl.innerHTML = '';
    contactListEl.appendChild(title);

    contacts.forEach(contact => {
        const item = document.createElement('div');
        item.className = 'contact-item';
        item.onclick = () => selectContact(contact);
        
        const avatarHtml = `
            <div class="contact-avatar">
                <img src="${avatarSheetUrl}" style="object-position: ${contact.imgPos}; object-fit: cover;">
            </div>
        `;
        
        item.innerHTML = `
            ${avatarHtml}
            <div class="contact-info">
                <div class="contact-name">${contact.name}</div>
                <div class="contact-handle">${contact.handle}</div>
            </div>
        `;
        contactListEl.appendChild(item);
    });
}

function appendNumber(num) {
    if (currentAmount.toString().length > 10) return;
    
    if (currentAmount === 0 && num !== '.') {
        currentAmount = num;
    } else {
        if (num === '.' && currentAmount.toString().includes('.')) return;
        currentAmount = parseFloat(currentAmount.toString() + num);
    }
    updateDisplay();
}

function deleteNumber() {
    let str = currentAmount.toString();
    if (str.length === 1 || (str.length === 2 && str.startsWith('-'))) {
        currentAmount = 0;
    } else {
        str = str.slice(0, -1);
        currentAmount = parseFloat(str);
    }
    updateDisplay();
}

function clearAmount() {
    currentAmount = 0;
    updateDisplay();
}

function updateDisplay() {
    const formatted = currentAmount.toLocaleString('en-US', {
        minimumFractionDigits: 0,
        maximumFractionDigits: 2
    });
    displayAmountEl.textContent = formatted;
    payHeaderAmountEl.textContent = '$' + formatted;
    checkPayButton();
}

function goToPayment() {
    if (currentAmount <= 0) return;
    
    document.getElementById('home-screen').classList.remove('active');
    document.getElementById('home-screen').classList.add('hidden');
    
    document.getElementById('payment-screen').classList.remove('hidden');
    document.getElementById('payment-screen').classList.add('active');
    
    setTimeout(() => recipientInput.focus(), 300);
    appContainer.classList.add('keyboard-active');
}

function handleRecipientInput() {
    const val = recipientInput.value;
    currentRecipient = val;
    checkPayButton();
    
    const items = document.querySelectorAll('.contact-item');
    if (val.length > 0) {
        items.forEach(item => item.style.display = 'none');
    } else {
        items.forEach(item => item.style.display = 'flex');
    }
}

function selectContact(contact) {
    recipientInput.value = contact.handle;
    currentRecipient = contact.name;
    handleRecipientInput();
    recipientInput.blur();
    appContainer.classList.remove('keyboard-active');
}

function addNewContact() {
    const name = prompt("Enter contact name:");
    if (name) {
        const handle = "$" + name.toLowerCase().replace(/\s/g, '');
        const newContact = {
            name: name,
            handle: handle,
            imgPos: "0% 0%"
        };
        contacts.unshift(newContact);
        initContacts();
    }
}

function checkPayButton() {
    if (currentAmount > 0 && recipientInput.value.trim().length > 0) {
        confirmPayBtn.disabled = false;
    } else {
        confirmPayBtn.disabled = true;
    }
}

function processPayment() {
    appContainer.classList.remove('keyboard-active');
    
    document.getElementById('payment-screen').classList.remove('active');
    document.getElementById('payment-screen').classList.add('hidden');
    
    document.getElementById('processing-screen').classList.remove('hidden');
    document.getElementById('processing-screen').classList.add('active');

    setTimeout(() => {
        showSuccess();
    }, 2000);
}

function showSuccess() {
    document.getElementById('processing-screen').classList.remove('active');
    document.getElementById('processing-screen').classList.add('hidden');
    
    const successScreen = document.getElementById('success-screen');
    successScreen.classList.remove('hidden');
    successScreen.classList.add('active');
    
    document.getElementById('success-amount').textContent = '$' + currentAmount.toLocaleString('en-US', {minimumFractionDigits: 2});
    
    const recipientName = currentRecipient || recipientInput.value;
    document.getElementById('success-recipient').textContent = recipientName;

    currentBalance -= currentAmount;
    homeBalanceEl.textContent = '$' + currentBalance.toLocaleString('en-US', {minimumFractionDigits: 2});
    payBalanceEl.textContent = '$' + currentBalance.toLocaleString('en-US', {minimumFractionDigits: 2});
}

function resetApp() {
    currentAmount = 0;
    currentRecipient = '';
    recipientInput.value = '';
    updateDisplay();
    
    const items = document.querySelectorAll('.contact-item');
    items.forEach(item => item.style.display = 'flex');

    document.getElementById('success-screen').classList.remove('active');
    document.getElementById('success-screen').classList.add('hidden');
    
    document.getElementById('home-screen').classList.remove('hidden');
    document.getElementById('home-screen').classList.add('active');
}

initContacts();


              </script>
                        </body>
                        </html>
